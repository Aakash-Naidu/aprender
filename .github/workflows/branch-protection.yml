name: Branch Protection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the entire workspace including apr-cli binary (catches GH-301-style issues)
  workspace-build:
    name: Workspace Build (fresh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # No rust-cache on purpose — simulates fresh clone
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check entire workspace compiles
        run: cargo check --workspace
      - name: Build apr-cli release binary
        run: cargo build --release -p apr-cli
      - name: Verify apr binary works
        run: ./target/release/apr --version

  # Compile all examples (catches include!() and hard-coded path issues)
  examples-compile:
    name: Compile All Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Compile all examples
        run: cargo build --examples
      - name: Compile apr-cli examples
        run: cargo build --examples -p apr-cli

  # Verify include!() files are tracked by git (prevents CB-510 regression)
  include-files:
    name: Include File Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all include!() files are git-tracked
        run: bash scripts/check_include_files.sh
      - name: Check all src/ include!() files in cargo package
        run: bash scripts/check_package_includes.sh

  # Verify no hard-coded system paths (prevents GH-301 regression)
  no-hardcoded-paths:
    name: No Hard-coded Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hard-coded mount paths in source
        run: |
          VIOLATIONS=$(grep -rn '/mnt/' src/ crates/ examples/ tests/ --include='*.rs' \
            | grep -v '/target/' \
            | grep -v '// ' \
            | grep -v 'test' \
            | grep -v '#\[' || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Hard-coded /mnt/ paths found in source code:"
            echo "$VIOLATIONS"
            echo ""
            echo "Use CARGO_TARGET_DIR, env vars, or relative paths instead (GH-301)."
            exit 1
          fi
          echo "No hard-coded /mnt/ paths found"

      - name: Check for hard-coded home directory paths
        run: |
          VIOLATIONS=$(grep -rn '/home/[a-z]' src/ crates/ examples/ --include='*.rs' \
            | grep -v '/target/' \
            | grep -v '// ' \
            | grep -v 'test' \
            | grep -v '#\[' \
            | grep -v 'doc(' \
            | grep -v '//!' || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Hard-coded /home/ paths found (may be intentional in tests):"
            echo "$VIOLATIONS"
          fi
          echo "Path check complete"

  # Cross-platform check (catches platform-specific issues)
  cross-platform:
    name: Cross-Platform Check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check workspace compiles
        run: cargo check --workspace
      - name: Run unit tests
        run: cargo test --lib
