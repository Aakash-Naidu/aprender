    parameters: "1.7B"
    hidden_dim: 2048
    num_layers: 28
    num_heads: 16
    num_kv_heads: 8
    intermediate_dim: 6144
    vocab_size: 151936
    max_position_embeddings: 40960
    head_dim: 128
    rope_theta: 1000000.0
    rms_norm_eps: 0.000001
    tied_embeddings: true
  4b:
